<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoList</title>
</head>

<body>
  <div class="buttons">
    <button id="addButton" command="show-modal" commandfor="inputToDo">Add to do</button>

  </div>
  <div class="mainUI">
    <div class="nav">      
    </div>
    <div class="toDosContainer">
      <!-- <div class="todo" data-id="1232">
        <div class="todoContent">
          <h1>title</h1>
          <p>description</p>
          <span>priority</span>
        </div>
        <button class="delButton">Delete task</button>
      </div> -->
    </div>    
  </div>

  <dialog id="inputToDo">
    <form id="inputForm" method="dialog">
      <label for="tdTitle">Title:</label><br>
      <input type="text" id="tdTitle" name="tdTitle" required><br>
      <label for="tdDesc">Description:</label><br>
      <input type="text" id="tdDesc" name="tdDesc"><br>

      <label for="tdProject">Project:</label><br>
      <input type="text" id="tdProject" name="tdProject"><br>
      
      <label for="tdDate">Deadline:</label><br>
      <input type="date" id="tdDate" name="tdDate"><br><br>

      <label for="tdPriority">Priority:</label>
      <select id="tdPriority" name="tdPriority">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>      
      </select><br>           
    </form>
    <button id="tdAddTask" type="submit" form="inputForm">Add Task</button> 
    <button commandfor="inputToDo" command="close">Cancel</button>
    
  </dialog>
</body>

</html>
