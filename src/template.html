<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoList</title>
</head>

<body>
  <div class="buttons">
    <button id="addButton" command="show-modal" commandfor="inputToDo">Add to do</button>
    <button id="addProject" command="show-modal" commandfor="inputProject">Add Project</button>
    <button id="showAllToDos">All ToDos</button>
  </div>
  <div class="mainUI">
    <div class="nav">      
    </div>
    <div class="toDosContainer">
      <!-- <div class="todo" data-id="1232">
        <div class="todoHeader">
          <h1>title</h1>
          <button class="delButton">Delete</button>
          <button class="editButton">Edit</button>
        </div>
        <div class="todoContent">          
          <p>description</p>
          <span>priority</span>
          <span>Deadline</span>
          <span>Project</span>
        </div>        
      </div> -->
    </div>
  </div>

  <dialog id="inputToDo">
    <form id="inputForm" method="dialog">
      <label for="tdTitle">Title:</label><br>
      <input type="text" id="tdTitle" name="tdTitle" required><br>
      <label for="tdDesc">Description:</label><br>
      <input type="text" id="tdDesc" name="tdDesc"><br>


      <label for="tdProject">Project:</label>      
      <select id="tdProject" name="tdProject">  
        <option value="Home">Home</option>      
      </select><br>


      <label for="tdDate">Deadline:</label><br>
      <input type="date" id="tdDate" name="tdDate"><br>

      <label for="tdPriority">Priority:</label>
      <select id="tdPriority" name="tdPriority">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select><br>
    </form>
    <button id="tdAddTask" type="submit" form="inputForm">Add Task</button>
    <button commandfor="inputToDo" command="close">Cancel</button>
  </dialog>

  <dialog id="inputProject">
    <form id="projectForm" method="dialog">
      <label for="pjTitle">Title:</label><br>
      <input type="text" id="pjTitle" name="pjTitle" required><br>
      <label for="pjColor">Color:</label><br>
      <input type="text" id="pjColor" name="pjColor"><br>
    </form><br>
    <button id="pjAddProject" type="submit" form="projectForm">Add Project</button>
    <button commandfor="inputProject" command="close">Cancel</button>
  </dialog>

  <dialog id="reInputToDo">
    <form id="reInputForm" method="dialog">
      <label for="tdTitle2">Title:</label><br>
      <input type="text" id="tdTitle2" name="tdTitle2" ><br>
      <label for="tdDesc2">Description:</label><br>
      <input type="text" id="tdDesc2" name="tdDesc2"><br>


      <label for="tdProject2">Project:</label>      
      <select id="tdProject2" name="tdProject2">  
        <option value="Home">Home</option>      
      </select><br>


      <label for="tdDate2">Deadline:</label><br>
      <input type="date" id="tdDate2" name="tdDate2"><br>

      <label for="tdPriority2">Priority:</label>
      <select id="tdPriority2" name="tdPriority2">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select><br>
    </form>
    <button id="tdreInput" type="submit" form="reInputForm">Save Edit</button>
    <button commandfor="reInputToDo" command="close">Cancel</button>
  </dialog>
</body>

</html>
