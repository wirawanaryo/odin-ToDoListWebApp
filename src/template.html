<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoList</title>
</head>

<body>

  <div class="mainUI">
    <div class="headerContainer">
      <span>To-Do List App</span>
      <button onclick="window.close()">✖</button>
    </div>
    <div class="buttons">
      <button id="addButton" command="show-modal" commandfor="inputToDo">New Task</button>
      <button id="addProject" command="show-modal" commandfor="inputProject">New Project</button>
      <button id="showAllToDos">All Tasks</button>
    </div>
    <div class="nav">
    </div>
    <div class="toDosContainer">
      <!-- <div class="todo" data-id="1232">
        <div class="todoHeader">
          <h1>title</h1>
          <button class="delButton">Delete</button>
          <button class="editButton">Edit</button>
        </div>
        <div class="todoContent">          
          <p>description</p>
          <span>priority</span>
          <span>Deadline</span>
          <span>Project</span>
        </div>        
      </div> -->
    </div>
  </div>

  <dialog id="inputToDo">
    <div class="dialogHeader">Input Task Details</div>
    <form id="inputForm" method="dialog">
      <label for="tdTitle">Title:</label>
      <input type="text" id="tdTitle" name="tdTitle" required>
      <label for="tdDesc">Description:</label>
      <textarea id="tdDesc" name="tdDesc" rows="4"></textarea>


      <label for="tdProject">Project:</label>
      <select id="tdProject" name="tdProject">
        <option value="Home">Home</option>
      </select>


      <label for="tdDate">Deadline:</label>
      <input type="date" id="tdDate" name="tdDate">

      <label for="tdPriority">Priority:</label>
      <select id="tdPriority" name="tdPriority">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
    </form>
    <div>
    </div>
    <div class="dialogButtons">
      <button id="tdAddTask" type="submit" form="inputForm">Add Task</button>
      <button commandfor="inputToDo" onclick="document.getElementById('inputToDo').close()">Cancel</button>
    </div>

  </dialog>

  <dialog id="inputProject">
    <div class="dialogHeader">Input Project Details</div>
    <form id="projectForm" method="dialog">
      <label for="pjTitle">Title:</label>
      <input type="text" id="pjTitle" name="pjTitle" required>
      <label for="pjColor">Color:</label>
      <select id="pjColor" name="pjColor">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="yellow">Yellow</option>
        <option value="green">Green</option>
        <option value="purple">Purple</option>
        <option value="orange">Orange</option>
      </select>
    </form>
    <div class="dialogButtons">
      <button id="pjAddProject" type="submit" form="projectForm">Add Project</button>
      <button commandfor="inputProject" command="close">Cancel</button>
    </div>
  </dialog>

  <dialog id="reInputToDo">
    <div class="dialogHeader">Edit Project Details</div>
    <form id="reInputForm" method="dialog">
      <label for="tdTitle2">Title:</label>
      <input type="text" id="tdTitle2" name="tdTitle2">
      <label for="tdDesc2">Description:</label>
      <textarea id="tdDesc2" name="tdDesc2" rows="4"></textarea>      

      <label for="tdProject2">Project:</label>
      <select id="tdProject2" name="tdProject2">
        <option value="Home">Home</option>
      </select>

      <label for="tdDate2">Deadline:</label>
      <input type="date" id="tdDate2" name="tdDate2">

      <label for="tdPriority2">Priority:</label>
      <select id="tdPriority2" name="tdPriority2">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
    </form>
    <div class="dialogButtons">
      <button id="tdreInput" type="submit" form="reInputForm">Save Edit</button>
      <button commandfor="reInputToDo" command="close">Cancel</button>
    </div>
  </dialog>
</body>

</html>
